<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>职能沟通翻译助手</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="app-header">
        <div class="header-copy">
          <p class="eyebrow">Cross-Function Translation Desk</p>
          <h1>职能沟通翻译助手</h1>
          <p class="hero-text">
            输入一句需求或一段技术方案，系统会实时翻译成另一角色更容易执行、理解和沟通的版本。
          </p>
        </div>
        <div class="header-note">
          <span class="note-pill">Streaming + Markdown</span>
          <p>输出区支持 Markdown 预览与流式轨迹，方便边生成边审阅。</p>
        </div>
      </header>

      <main class="workspace">
        <section class="input-panel">
          <div class="panel-top">
            <div>
              <p class="panel-kicker">Input</p>
              <h2>输入原文</h2>
            </div>
            <span class="panel-mini">2-Way</span>
          </div>

          <div class="direction-switch" role="tablist" aria-label="翻译方向">
            <button class="direction-btn active" data-direction="pm_to_dev" type="button">
              产品 -> 开发
            </button>
            <button class="direction-btn" data-direction="dev_to_pm" type="button">
              开发 -> 产品
            </button>
          </div>

          <label class="field-label" for="sourceText">原始内容</label>
          <textarea
            id="sourceText"
            placeholder="输入需求描述或技术方案，系统会按当前方向进行翻译。"
          ></textarea>

          <div class="controls-row">
            <label class="checkbox-row">
              <input id="autoDetect" type="checkbox" checked />
              <span>自动识别场景并显示提示</span>
            </label>
            <button id="runButton" class="primary-btn" type="button">开始翻译</button>
          </div>

          <div class="examples">
            <div class="examples-head">
              <p class="examples-title">Quick Clips</p>
              <span>一键填充典型输入</span>
            </div>
            <div class="example-row">
              <button
                class="example-chip"
                data-direction="pm_to_dev"
                data-text="我们需要一个智能推荐功能，提升用户停留时长"
                type="button"
              >
                智能推荐需求
              </button>
              <button
                class="example-chip"
                data-direction="dev_to_pm"
                data-text="我们优化了数据库查询，QPS提升了30%"
                type="button"
              >
                数据库优化结论
              </button>
            </div>
          </div>
        </section>

        <section class="output-panel">
          <div class="panel-top">
            <div>
              <p class="panel-kicker">Output</p>
              <h2>翻译结果</h2>
            </div>
            <button id="copyButton" class="ghost-btn" type="button">复制结果</button>
          </div>

          <div class="status-strip">
            <span id="directionBadge" class="status-badge">产品 -> 开发</span>
            <span id="sceneBadge" class="status-badge muted">场景待识别</span>
            <span id="modelBadge" class="status-badge muted">模型待连接</span>
          </div>

          <div id="feedback" class="feedback" aria-live="polite"></div>

          <div class="output-stage">
            <article class="module-card preview-card">
              <div class="module-head">
                <div>
                  <p class="card-kicker">Preview</p>
                  <h3>Markdown 预览</h3>
                </div>
                <span id="streamState" class="module-badge">等待中</span>
              </div>
              <div id="markdownPreview" class="markdown-preview">
                <div class="empty-state">生成后这里会以 Markdown 格式实时呈现。</div>
              </div>
            </article>

            <article class="module-card stream-card">
              <div class="module-head">
                <div>
                  <p class="card-kicker">Trace</p>
                  <h3>流式轨迹</h3>
                </div>
              </div>
              <pre id="liveOutput" class="live-output">等待输入...</pre>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
